hypothesis: >
  A blend of short-horizon cross-sectional factors (reversal, volume, volatility)
  ranks crypto names such that the top-minus-bottom quantile spread earns a
  positive risk-adjusted return net of costs.
rationale: >
  Cross-sectional mispricing in mid-cap crypto: liquidity-driven reversal and
  volume/volatility signals predict relative performance over a few days. Edge
  is relative ranking, not directional market exposure (dollar-neutral L/S).
falsification:
  - "Cross-sectional IC not significantly > 0 (Stage 1 IC screen)"
  - "Deflated Sharpe <= 0 after multiple-testing correction"
  - "Net-of-cost IC <= 0 (turnover gate)"

