registry_id: 2026-06-medallion-lite
name: Medallion Lite
researcher: research
registered: "2026-06-10"
source: "scripts/research/medallion_lite/; flagship cross-sectional factor model"

# Routing: linear cross-sectional rank alpha -> cross-sectional pipeline.
payoff_shape: linear
track: cross_sectional
horizon_bars: 5

hypothesis: >
  A cross-sectional composite of five factors (momentum, volume surge, realized
  vol, proximity-to-high, risk-adjusted momentum) ranks crypto names such that
  the inverse-vol top-minus-bottom quantile spread earns a positive risk-adjusted
  return net of costs.
rationale: >
  Cross-sectional mispricing in mid-cap crypto: trend, attention/flow, and
  quality factors predict relative performance over a few days. Edge is relative
  ranking, not directional market exposure (inverse-vol, ~dollar-neutral L/S).
falsification:
  - "Cross-sectional IC not significantly > 0 (Stage 1 IC screen)"
  - "Deflated Sharpe <= 0 after multiple-testing correction"
  - "Net-of-cost IC <= 0 (turnover gate)"

signal_fn: signals.cross_sectional.medallion_lite
signal_params:
  lookback: 7
universe: midcap_usd
bar_frequency: "1d"
cost_profile: crypto_default

pre_registered_metrics:
  sharpe: {expected: 1.96, confidence: medium}
  mean_ic: {expected: 0.04, confidence: low}

# Realized results from the PRE-REGISTERED auditable validation
# (docs/research/medallion_validation_protocol.md; manifest in artifacts/medallion_audit/).
# HEADLINE = frozen-param (no params fit on data); walk-forward reported as an upper bound.
validation:
  method: >
    Pre-registered, deterministic, auditable run (run_medallion_audit.py). HEADLINE uses
    FROZEN flagship params (entry 0.65 / exit 0.40 / trail 0.15) -- nothing fit on the data --
    on a POINT-IN-TIME top-100-by-20d-trailing-ADV universe (survivorship-free), within-universe
    cross-sectional ranking, 30bps one-way, OOS=2023+. Walk-forward (param-selected) is reported
    as an UPPER BOUND (2.95). Acceptance gates G1-G4 all pass.
  data_range: "2021-01..2026-06; OOS = 2023-01-01 onward (1248 days)"
  universe: "coinbase USD pairs, point-in-time top-100 by 20d trailing ADV (within-universe rank)"
  costs_bps: 30.0
  oos_sortino: 2.84          # frozen headline
  oos_sharpe: 2.15
  oos_cagr: 1.73
  oos_max_dd: -0.37
  benchmark: "BTC buy&hold"
  benchmark_oos_sortino: 1.78
  caveats:
    - "OPEN GATING HURDLE (not a kill): realized round-trip execution cost on small-cap names, TBD by
       separate execution research. Headline 2.84 assumes ~30bps ROUND TRIP (the engine charges tc_bps
       as round-trip = ~15bps/side). Sensitivity: flat round-trip 0/10/20/30/50bps -> Sortino
       3.50/3.27/3.05/2.84/2.42; clears 2.0 to ~70bps flat-equivalent. BUT the alpha concentrates in
       small-caps, so if their round-trip cost runs high (liquidity-tiered test at 20/40/70/120bps ->
       1.42; +impact -> <1.0 by $25M AUM) the edge erodes. PASS/FAIL is set by the execution-cost number
       once known. See medallion_cost_sensitivity.json / medallion_cost_universe.json."
    - "HEADLINE is frozen-param (2.84) at ~30bps ROUND TRIP; walk-forward UPPER BOUND is 2.95. The
       earlier reported 2.95 carried a parameter-selection optimism removed here."
    - "Per-fold OOS Sortino decays 4.72 (2023) -> 2.72 (2024) -> 1.67 (2025-26): all positive,
       but the recent edge is softening."
    - "Cost-robust: OOS Sortino 3.50/3.27/3.05/2.84/2.42 at 0/10/20/30/50 bps. 30bps flat may
       still understate slippage on rank 50-100 names; tiered-cost re-test is the next gate."
    - "PSR vs 0 = 1.00 (frozen OOS) -- the base signal's Sharpe is genuine. The 100-factor zoo and
       ALL ensembling were rejected: design selection fails PBO (0.70-0.77). Use the 5-factor composite."
    - "signal_fn here is a SIMPLIFIED daily proxy; validated metrics are from the flagship hourly
       pipeline. Universe is RECONSTRUCTED from trailing ADV; production should use a committed
       point-in-time membership table (method reconciled: membership replays the 1.97 top-50 baseline)."
  provenance:
    - "docs/research/medallion_validation_protocol.md (pre-registered protocol, committed 2ed0402)"
    - "scripts/research/k2_atlas/run_medallion_audit.py (deterministic auditable harness)"
    - "artifacts/medallion_audit/medallion_audit_<commit>.json (+ _daily_returns.csv) -- provenance manifest"
    - "scripts/research/k2_atlas/run_medallion_validation.py (DSR/PBO; rejected factor zoo + ensembling)"
    - "K2 TRADE ATLAS rules applied: QF-01, QF-07, QF-10, CV-17, QF-21, MR-09"

